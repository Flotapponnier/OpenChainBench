# OpenChainBench — Bench № 003

slug: price-feed-freshness
number: "003"
title: Price Feed — Freshness & Coverage
subtitle: How stale is the last price? A walk through the major crypto market-data feeds.
category: Data
status: live
metric: Update latency
unit: ms

abstract: |
  We measure the time between an on-chain trade settling and the corresponding
  price update appearing on each commercial market-data feed. The harness
  watches reference DEX pools on Ethereum, Solana and Base, and continuously
  polls (or subscribes via websocket where available) each feed for the same
  token. We report the median delta along with token coverage and uptime.

methodology:
  - "Reference: Uniswap v3, Raydium and Aerodrome pools for 60 tokens (top 50 by volume + 10 long-tail)."
  - "Capture: a private archive node records each Swap event with millisecond timestamps."
  - "Subscription: websocket where supported, 1-second polling otherwise."
  - "Latency: time between Swap event timestamp and the first feed response that reflects the new price within ±0.05%."
  - "Coverage: a token counts as 'covered' if any feed-side endpoint resolves it within 200 ms."
  - "Window: 24 hours, measured continuously."

findings: []

source: https://github.com/Flotapponnier/OpenChainBench/tree/main/harnesses/feed-freshness

prometheus:
  url: https://prometheus-production-0859.up.railway.app
  window: 24h

# Conventions for the feed-freshness harness:
#   ocb_feed_lag_ms_bucket{provider, token, le}
#   ocb_feed_total{provider, token, success="true|false"}

providers:
  - slug: mobula-api
    name: Mobula API
    tag: WS + REST
    secondary: { label: "Tokens covered", value: "2.1M" }
    queries:
      p50: histogram_quantile(0.5,  sum by (le) (rate(ocb_feed_lag_ms_bucket{provider="mobula-api"}[24h])))
      p90: histogram_quantile(0.9,  sum by (le) (rate(ocb_feed_lag_ms_bucket{provider="mobula-api"}[24h])))
      p99: histogram_quantile(0.99, sum by (le) (rate(ocb_feed_lag_ms_bucket{provider="mobula-api"}[24h])))
      success: sum(rate(ocb_feed_total{provider="mobula-api", success="true"}[24h])) / sum(rate(ocb_feed_total{provider="mobula-api"}[24h]))
      sample_size: sum(increase(ocb_feed_total{provider="mobula-api"}[24h]))
      series: histogram_quantile(0.5, sum by (le) (rate(ocb_feed_lag_ms_bucket{provider="mobula-api"}[1h])))

