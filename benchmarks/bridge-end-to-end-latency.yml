# OpenChainBench — Bench № 002

slug: bridge-end-to-end-latency
number: "002"
title: Cross-Chain Bridge — End-to-End Latency
subtitle: Time from source-chain confirmation to destination-chain settlement, across the major bridge aggregators.
category: Bridges
status: live
metric: End-to-end settlement
unit: s

abstract: |
  We measure the wall-clock time between a user-signed source transaction and
  credit on the destination chain through the major bridge aggregators. The
  harness submits real cross-chain transfers ($25 notional in USDC) on three
  popular routes (Ethereum → Arbitrum, Arbitrum → Base, Polygon → Optimism)
  and times them end-to-end. Failure modes (stuck transactions, dropped
  routes, refund flows) are recorded.

methodology:
  - "Routes: ETH → ARB, ARB → BASE, POL → OP. Token: USDC (native or canonical)."
  - "Trade size: 25 USDC notional. Slippage tolerance fixed at 0.5%."
  - "Cadence: 60 transfers per route per provider over 24 hours, evenly spaced."
  - "Timing: source confirmation → first finalised credit on destination, measured against canonical RPC nodes."
  - "Failures: stuck or refunded transfers count toward success rate. They are excluded from latency aggregates."
  - "Funds: harness wallets are publicly listed; all transactions are auditable on-chain."

findings: []

source: https://github.com/Flotapponnier/OpenChainBench/tree/main/harnesses/bridge-e2e

prometheus:
  url: https://prometheus-production-9ffe.up.railway.app
  window: 24h

# Conventions for the bridge-e2e harness:
#   ocb_bridge_settlement_ms_bucket{provider, route, region, le}
#   ocb_bridge_total{provider, route, region, success="true|false"}

providers:
  - slug: across
    name: Across
    tag: Optimistic relay
    secondary: { label: "Routes covered", value: "78" }
    queries:
      p50: histogram_quantile(0.5,  sum by (le) (rate(ocb_bridge_settlement_ms_bucket{provider="across"}[24h])))
      p90: histogram_quantile(0.9,  sum by (le) (rate(ocb_bridge_settlement_ms_bucket{provider="across"}[24h])))
      p99: histogram_quantile(0.99, sum by (le) (rate(ocb_bridge_settlement_ms_bucket{provider="across"}[24h])))
      success: sum(rate(ocb_bridge_total{provider="across", success="true"}[24h])) / sum(rate(ocb_bridge_total{provider="across"}[24h]))
      sample_size: sum(increase(ocb_bridge_total{provider="across"}[24h]))
      series: histogram_quantile(0.5, sum by (le) (rate(ocb_bridge_settlement_ms_bucket{provider="across"}[1h])))
      regions:
        - region: us-east
          p50: histogram_quantile(0.5, sum by (le) (rate(ocb_bridge_settlement_ms_bucket{provider="across", region="us-east"}[24h])))
        - region: eu-west
          p50: histogram_quantile(0.5, sum by (le) (rate(ocb_bridge_settlement_ms_bucket{provider="across", region="eu-west"}[24h])))
        - region: ap-southeast
          p50: histogram_quantile(0.5, sum by (le) (rate(ocb_bridge_settlement_ms_bucket{provider="across", region="ap-southeast"}[24h])))

