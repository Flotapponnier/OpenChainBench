      p50: histogram_quantile(0.5, sum by (le) (rate(ocb_quote_duration_ms_bucket{provider="jupiter"}[24h])))
      p90: histogram_quantile(0.9, sum by (le) (rate(ocb_quote_duration_ms_bucket{provider="jupiter"}[24h])))
      p99: histogram_quantile(0.99, sum by (le) (rate(ocb_quote_duration_ms_bucket{provider="jupiter"}[24h])))
      success: sum(rate(ocb_quote_total{provider="jupiter", success="true"}[24h])) / sum(rate(ocb_quote_total{provider="jupiter"}[24h]))
      sample_size: sum(increase(ocb_quote_duration_ms_count{provider="jupiter"}[24h]))
      series: histogram_quantile(0.5, sum by (le) (rate(ocb_quote_duration_ms_bucket{provider="jupiter"}[1h])))
