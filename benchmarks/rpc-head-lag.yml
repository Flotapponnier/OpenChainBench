      success: sum(rate(ocb_head_poll_total{provider="quicknode", success="true"}[24h])) / sum(rate(ocb_head_poll_total{provider="quicknode"}[24h]))
      series: histogram_quantile(0.5, sum by (le) (rate(ocb_head_lag_ms_bucket{provider="quicknode"}[1h])))

