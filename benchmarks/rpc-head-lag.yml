# OpenChainBench — Bench № 004

slug: rpc-head-lag
number: "004"
title: RPC Head Lag — How Far Behind the Tip?
subtitle: How quickly each RPC provider reports new blocks, measured against a private archive node tracking the canonical tip.
category: RPCs
status: live
metric: Head lag
unit: ms

abstract: |
  We measure the gap between the canonical chain tip and the head reported by
  each commercial RPC endpoint. The harness runs a fleet of private archive
  nodes (Ethereum, Base, Arbitrum, Polygon, Optimism), records every new
  block, then polls each RPC's `eth_blockNumber` every 250 ms and timestamps
  when the same block first becomes visible. Head lag is the wall-clock delta
  between the two. Reads that fail or return stale results past the timeout
  count as failures.

methodology:
  - "Chains: Ethereum, Base, Arbitrum, Polygon, Optimism. Cross-chain median is the headline."
  - "Reference: a private archive node per chain, peered to multiple sources, validated against block hash."
  - "Cadence: `eth_blockNumber` every 250 ms per provider per region for 24 hours."
  - "Regions: us-east-1, eu-west-1, ap-southeast-1. Cross-region median reported."
  - "Timeout: 2,000 ms. Stale reads past the timeout are excluded from latency aggregates and counted in success rate."
  - "Privacy: harness wallets are public; raw block-by-block timestamps are stored for audit."

findings: []

source: https://github.com/Flotapponnier/OpenChainBench/tree/main/harnesses/rpc-head-lag

prometheus:
  url: https://prometheus-production-0859.up.railway.app
  window: 24h

# Conventions for the rpc-head-lag harness:
#   ocb_head_lag_ms_bucket{provider, chain, region, le}
#   ocb_head_poll_total{provider, chain, region, success="true|false"}

providers:
  - slug: alchemy
    name: Alchemy
    tag: Supernode
    secondary: { label: "Chains", value: "9" }
    queries:
      p50: histogram_quantile(0.5,  sum by (le) (rate(ocb_head_lag_ms_bucket{provider="alchemy"}[24h])))
      p90: histogram_quantile(0.9,  sum by (le) (rate(ocb_head_lag_ms_bucket{provider="alchemy"}[24h])))
      p99: histogram_quantile(0.99, sum by (le) (rate(ocb_head_lag_ms_bucket{provider="alchemy"}[24h])))
      success: sum(rate(ocb_head_poll_total{provider="alchemy", success="true"}[24h])) / sum(rate(ocb_head_poll_total{provider="alchemy"}[24h]))
      sample_size: sum(increase(ocb_head_poll_total{provider="alchemy"}[24h]))
      series: histogram_quantile(0.5, sum by (le) (rate(ocb_head_lag_ms_bucket{provider="alchemy"}[1h])))

